{{define "base"}}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <!-- Viewport -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        >
        <!-- Load Missing.CSS -->
        <link rel="stylesheet" href="/static/css/missing.css" />
        <!-- Favicon and PWA settings -->
        <link rel="icon" type="image/png" href="/static/img/logo.png">
        <title>Gavia</title>
    </head>
    <body class="sidebar-layout" hx-boost="true">
        <header>
            <img height="96" width="96" src="/static/img/logo.png">
            <div class="<h1>">Gavia</div>
            <nav>
                <ul role="list">
                    <li>
                        <a href="/dashboard" aria-current="page">Dashboard</a>
                    </li>
                    <li>
                        <a href="/providers">Providers</a>
                    </li>
                    <li>
                        <p>
                            <b>About</b>
                            <ul role="list" class="margin">
                                <li>
                                    <a href="/licenses"
                                    >Free Software Licenses</a>
                                </li>
                            </ul>
                        </p>
                    </li>
                    <li>
                        <strong>
                            <a
                                href="/demos"
                                class="&lt;button&gt; width:100%"
                            >
                                Settings
                            </a>
                        </strong>
                    </li>
                    <li>
                        <strong>
                            <a
                                href="/demos"
                                class="&lt;button&gt; width:100%"
                            >
                                Logout
                            </a>
                        </strong>
                    </li>
                </ul>
            </nav>
        </header>
        <div>
            <main>
                {{template "content" .}}
            </main>
            {{template "footer" .FooterData}}
        </div>
        <!-- Load HTMX & HyperScript -->
        <script async src="/static/js/htmx.js"></script>
        <script async src="/static/js/hyperscript.js"></script>
    </body>
</html>
{{end}}
