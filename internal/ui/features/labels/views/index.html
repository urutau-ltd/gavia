{{define "content"}}
<section class="crud-view fullbleed">
    <header class="crud-head">
        <div>
            <h2>{{.Title}}</h2>
            <p class="crud-subtitle">Create reusable tags for servers and other infrastructure assets.</p>
        </div>
        <a href="/labels/new" class="ok <big> <button>" hx-get="/labels/new" hx-target="#label-editor" hx-swap="outerHTML">New label</a>
    </header>

    <section class="crud-grid flex-switch">
        <article class="box crud-list-box width:100%">
            <form id="labels-filters" class="tool-bar crud-toolbar margin-block-end" method="get" action="/labels" role="toolbar" aria-label="Filter labels">
                <div class="crud-field">
                    <label for="label-limit">Show</label>
                    <select id="label-limit" name="limit" hx-get="/labels" hx-target="#labels-body" hx-swap="innerHTML" hx-include="#label-search,#label-limit" hx-indicator="#labels-loading" hx-trigger="change" onchange="if (!window.htmx) this.form.submit();">
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>5</option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>10</option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>25</option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>50</option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>100</option>
                    </select>
                </div>
                <div class="crud-field crud-search-field">
                    <label for="label-search">Search</label>
                    <input id="label-search" name="q" type="search" placeholder="Label name" value="{{.SearchTerm}}" hx-get="/labels" hx-target="#labels-body" hx-swap="innerHTML" hx-include="#label-search,#label-limit" hx-indicator="#labels-loading" hx-trigger="keyup changed delay:300ms, search">
                </div>
                <button type="submit" class="info <button> <big> crud-filter-apply">Apply</button>
            </form>
            <small id="labels-loading" class="htmx-indicator" aria-live="polite">Updating view...</small>
            <table class="crud-table labels-table width:100%">
                <thead><tr><th scope="col">Label</th><th scope="col">Notes</th><th scope="col">Actions</th></tr></thead>
                <tbody id="labels-body">{{template "label-list" .}}</tbody>
            </table>
        </article>
        {{template "label-editor-panel" .}}
    </section>
</section>
{{end}}
