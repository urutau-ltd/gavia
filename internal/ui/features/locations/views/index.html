{{define "content"}}
<section class="locations-view">
    <header class="locations-head">
        <div>
            <h2>{{.Title}}</h2>
            <p class="location-subtitle">
                Manage the location of your assets here.
            </p>
        </div>

        <a
            href="/locations/new"
            class="ok &lt;button&gt; locations-create-action"
            hx-get="/locations/new"
            hx-target="#location-editor"
            hx-swap="outerHTML"
        >
            New location
        </a>
    </header>

    <section class="locations-grid flex-switch">
        <article class="box locations-list-box width:100%">
            <form
                id="locations-filters"
                class="tool-bar locations-toolbar margin-block-end"
                method="get"
                action="/locations"
                role="toolbar"
                aria-label="Filter locations"
            >
                <div class="location-field">
                    <label for="location-limit">Show</label>
                    <select
                        id="location-limit"
                        name="limit"
                        hx-get="/locations"
                        hx-target="#locations-body"
                        hx-swap="innerHTML"
                        hx-include="#location-search,#location-limit"
                        hx-indicator="#locations-loading"
                        hx-trigger="change"
                        onchange="if (!window.htmx) this.form.submit();"
                    >
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>
                            5
                        </option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>
                            10
                        </option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>
                            25
                        </option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>
                            50
                        </option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>
                            100
                        </option>
                    </select>
                </div>

                <div class="location-field location-search-field">
                    <label for="location-search">Search</label>
                    <input
                        id="location-search"
                        name="q"
                        type="search"
                        placeholder="Name, city or country"
                        value="{{.SearchTerm}}"
                        hx-get="/locations"
                        hx-target="#locations-body"
                        hx-swap="innerHTML"
                        hx-include="#location-search,#location-limit"
                        hx-indicator="#locations-loading"
                        hx-trigger="keyup changed delay:300ms, search"
                        onchange="if (!window.htmx) this.form.submit();"
                    >
                </div>

                <button type="submit" class="plain location-filter-apply">
                    Apply
                </button>
            </form>

            <small
                id="locations-loading"
                class="htmx-indicator"
                aria-live="polite"
            >Updating view...</small>

            <table class="locations-table width:100%">
                <thead>
                    <tr>
                        <th scope="col">Location</th>
                        <th scope="col">City</th>
                        <th scope="col">Country</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="locations-body">
                    {{template "location-list" .}}
                </tbody>
            </table>
        </article>

        {{template "location-editor-panel" .}}
    </section>
</section>
{{end}}
