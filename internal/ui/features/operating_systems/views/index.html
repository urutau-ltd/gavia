{{define "content"}}
<section class="gavia-page fullbleed padding-inline">
    <header
        class="crowded flex-row flex-wrap:wrap justify-content:space-between align-items:end"
    >
        <div>
            <h2>{{.Title}}</h2>
            <p class="gavia-subtitle">Manage your operating systems here.</p>
        </div>

        <a
            href="/os/new"
            class="ok <big> <button> os-create-action"
            hx-get="/os/new"
            hx-target="#os-editor"
            hx-swap="outerHTML"
        >
            New operating system
        </a>
    </header>

    <section class="crud-grid flex-switch">
        <article class="box crud-list-box width:100%">
            <form
                id="os-filters"
                class="tool-bar crud-toolbar margin-block-end"
                method="get"
                action="/os"
                role="toolbar"
                aria-label="Filter os..."
            >
                <div class="crud-field">
                    <label for="os-limit">Show</label>
                    <select
                        id="os-limit"
                        name="limit"
                        hx-get="/os"
                        hx-target="#os-body"
                        hx-swap="innerHTML"
                        hx-include="#os-search,#os-limit"
                        hx-indicator="#os-loading"
                        hx-trigger="change"
                    >
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>
                            5
                        </option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>
                            10
                        </option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>
                            25
                        </option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>
                            50
                        </option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>
                            100
                        </option>
                    </select>
                </div>

                <div class="crud-field crud-search-field">
                    <label for="os-search">Search</label>
                    <input
                        id="os-search"
                        name="q"
                        type="search"
                        placeholder="Operating system name"
                        value="{{.SearchTerm}}"
                        hx-get="/os"
                        hx-target="#os-body"
                        hx-swap="innerHTML"
                        hx-include="#os-search,#os-limit"
                        hx-indicator="#os-loading"
                        hx-trigger="keyup changed delay:300ms, search"
                    >
                </div>

                <button
                    type="submit"
                    class="info <button> <big> margin-inline-start:auto"
                >
                    Apply
                </button>
            </form>

            <small
                id="os-loading"
                class="htmx-indicator"
                aria-live="polite"
            >Updating view...</small>

            <table class="crud-table os-table width:100%">
                <thead>
                    <tr>
                        <th scope="col">Operating System</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="os-body">
                    {{template "os-list" .}}
                </tbody>
            </table>
        </article>

        {{template "os-editor-panel" .}}
    </section>
</section>
{{end}}
