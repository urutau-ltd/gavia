{{define "content"}}
<section class="gavia-page fullbleed padding-inline">
    <header
        class="crowded flex-row flex-wrap:wrap justify-content:space-between align-items:end"
    >
        <div>
            <h2>{{.Title}}</h2>
            <p class="gavia-subtitle">
                Track renewals, providers, and billing data for registered
                domains.
            </p>
        </div>

        <a
            href="/domains/new"
            class="ok <big> <button> crud-create-action"
            hx-get="/domains/new"
            hx-target="#domain-editor"
            hx-swap="outerHTML"
        >
            New domain
        </a>
    </header>

    <section class="crud-grid flex-switch">
        <article class="box crud-list-box width:100%">
            <form
                id="domains-filters"
                class="tool-bar crud-toolbar margin-block-end"
                method="get"
                action="/domains"
                role="toolbar"
                aria-label="Filter domains"
            >
                <div class="crud-field">
                    <label for="domain-limit">Show</label>
                    <select
                        id="domain-limit"
                        name="limit"
                        hx-get="/domains"
                        hx-target="#domains-body"
                        hx-swap="innerHTML"
                        hx-include="#domain-search,#domain-limit"
                        hx-indicator="#domains-loading"
                        hx-trigger="change"
                    >
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>
                            5
                        </option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>
                            10
                        </option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>
                            25
                        </option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>
                            50
                        </option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>
                            100
                        </option>
                    </select>
                </div>

                <div class="crud-field crud-search-field">
                    <label for="domain-search">Search</label>
                    <input
                        id="domain-search"
                        name="q"
                        type="search"
                        placeholder="Domain or provider"
                        value="{{.SearchTerm}}"
                        hx-get="/domains"
                        hx-target="#domains-body"
                        hx-swap="innerHTML"
                        hx-include="#domain-search,#domain-limit"
                        hx-indicator="#domains-loading"
                        hx-trigger="keyup changed delay:300ms, search"
                    >
                </div>

                <button
                    type="submit"
                    class="info <button> <big> margin-inline-start:auto"
                >
                    Apply
                </button>
            </form>

            <small
                id="domains-loading"
                class="htmx-indicator"
                aria-live="polite"
            >Updating view...</small>

            <table class="crud-table domains-table width:100%">
                <thead>
                    <tr>
                        <th scope="col">Domain</th>
                        <th scope="col">Provider</th>
                        <th scope="col">Billing</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="domains-body">
                    {{template "domain-list" .}}
                </tbody>
            </table>
        </article>

        {{template "domain-editor-panel" .}}
    </section>
</section>
{{end}}
