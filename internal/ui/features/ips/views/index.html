{{define "content"}}
<section class="crud-view fullbleed">
    <header class="crud-head">
        <div>
            <h2>{{.Title}}</h2>
            <p class="crud-subtitle">
                Track public or private addresses that can later be assigned to
                servers.
            </p>
        </div>

        <a
            href="/ips/new"
            class="ok <big> <button>"
            hx-get="/ips/new"
            hx-target="#ip-editor"
            hx-swap="outerHTML"
        >New IP address</a>
    </header>

    <section class="crud-grid flex-switch">
        <article class="box crud-list-box width:100%">
            <form
                id="ips-filters"
                class="tool-bar crud-toolbar margin-block-end"
                method="get"
                action="/ips"
                role="toolbar"
                aria-label="Filter IP addresses"
            >
                <div class="crud-field">
                    <label for="ip-limit">Show</label>
                    <select
                        id="ip-limit"
                        name="limit"
                        hx-get="/ips"
                        hx-target="#ips-body"
                        hx-swap="innerHTML"
                        hx-include="#ip-search,#ip-limit"
                        hx-indicator="#ips-loading"
                        hx-trigger="change"
                        onchange="if (!window.htmx) this.form.submit();"
                    >
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>
                            5
                        </option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>
                            10
                        </option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>
                            25
                        </option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>
                            50
                        </option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>
                            100
                        </option>
                    </select>
                </div>
                <div class="crud-field crud-search-field">
                    <label for="ip-search">Search</label>
                    <input
                        id="ip-search"
                        name="q"
                        type="search"
                        placeholder="Address, type, city, org"
                        value="{{.SearchTerm}}"
                        hx-get="/ips"
                        hx-target="#ips-body"
                        hx-swap="innerHTML"
                        hx-include="#ip-search,#ip-limit"
                        hx-indicator="#ips-loading"
                        hx-trigger="keyup changed delay:300ms, search"
                    >
                </div>
                <button
                    type="submit"
                    class="info <button> <big> crud-filter-apply"
                >
                    Apply
                </button>
            </form>
            <small id="ips-loading" class="htmx-indicator" aria-live="polite"
            >Updating view...</small>

            <table class="crud-table ips-table width:100%">
                <thead>
                    <tr>
                        <th scope="col">Address</th>
                        <th scope="col">Type</th>
                        <th scope="col">Origin</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="ips-body">{{template "ip-list" .}}</tbody>
            </table>
        </article>

        {{template "ip-editor-panel" .}}
    </section>
</section>
{{end}}
