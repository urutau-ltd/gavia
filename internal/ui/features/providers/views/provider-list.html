{{define "provider-list"}} {{- range .Providers}}
<tr id="provider-row-{{.Id}}">
    <td data-label="Provider"><strong>{{.Name}}</strong></td>
    <td data-label="Website">
        {{- if .Website -}}
        <a href="{{.WebsiteValue}}" target="_blank" rel="noreferrer"
        >{{.WebsiteValue}}</a>
        {{- else -}}
        <span class="provider-muted">No website</span>
        {{- end -}}
    </td>
    <td data-label="Actions">
        <div class="provider-actions">
            <a
                class="plain block provider-action-control"
                title="View"
                aria-label="View provider {{.Name}}"
                href="/providers/{{.Id}}"
                hx-get="/providers/{{.Id}}"
                hx-target="#provider-editor"
                hx-swap="outerHTML"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-eye-fill"
                    viewBox="0 0 16 16"
                    aria-hidden="true"
                >
                    <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0" />
                    <path
                        d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"
                    />
                </svg>
            </a>

            <a
                class="ok provider-action-control"
                title="Edit"
                aria-label="Edit provider {{.Name}}"
                href="/providers/{{.Id}}/edit"
                hx-get="/providers/{{.Id}}/edit"
                hx-target="#provider-editor"
                hx-swap="outerHTML"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-pencil-fill"
                    viewBox="0 0 16 16"
                    aria-hidden="true"
                >
                    <path
                        d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"
                    />
                </svg>
            </a>

            <button
                type="button"
                title="Delete"
                class="bad provider-action-control"
                aria-label="Delete provider {{.Name}}"
                hx-delete="/providers/{{.Id}}"
                hx-target="#provider-editor"
                hx-swap="outerHTML"
                hx-include="#provider-search,#provider-limit"
                hx-confirm="Are you sure you want to delete this provider?"
                _="on click add .is-removing to #provider-row-{{.Id}}"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-trash-fill"
                    viewBox="0 0 16 16"
                    aria-hidden="true"
                >
                    <path
                        d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5M8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5m3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0"
                    />
                </svg>
            </button>
        </div>
    </td>
</tr>
{{- else}}
<tr>
    <td colspan="3"><em>No providers are registered in the database.</em></td>
</tr>
{{- end}} {{end}}
