{{define "content"}}
<section class="providers-view fullbleed">
    <header class="providers-head">
        <div>
            <h2>{{.Title}}</h2>
            <p class="provider-subtitle">Manage your service providers here.</p>
        </div>

        <a
            href="/providers/new"
            class="ok <big> <button> providers-create-action"
            hx-get="/providers/new"
            hx-target="#provider-editor"
            hx-swap="outerHTML"
        >
            New provider
        </a>
    </header>

    <section class="providers-grid flex-switch">
        <article class="box providers-list-box width:100%">
            <form
                id="providers-filters"
                class="tool-bar providers-toolbar margin-block-end"
                method="get"
                action="/providers"
                role="toolbar"
                aria-label="Filter providers..."
            >
                <div class="provider-field">
                    <label for="provider-limit">Show</label>
                    <select
                        id="provider-limit"
                        name="limit"
                        hx-get="/providers"
                        hx-target="#providers-body"
                        hx-swap="innerHTML"
                        hx-include="#provider-search,#provider-limit"
                        hx-indicator="#providers-loading"
                        hx-trigger="change"
                        onchange="if (!window.htmx) this.form.submit();"
                    >
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>
                            5
                        </option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>
                            10
                        </option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>
                            25
                        </option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>
                            50
                        </option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>
                            100
                        </option>
                    </select>
                </div>

                <div class="provider-field provider-search-field">
                    <label for="provider-search">Search</label>
                    <input
                        id="provider-search"
                        name="q"
                        type="search"
                        placeholder="Provider name"
                        value="{{.SearchTerm}}"
                        hx-get="/providers"
                        hx-target="#providers-body"
                        hx-swap="innerHTML"
                        hx-include="#provider-search,#provider-limit"
                        hx-indicator="#providers-loading"
                        hx-trigger="keyup changed delay:300ms, search"
                    >
                </div>

                <button
                    type="submit"
                    class="info <button> <big> provider-filter-apply"
                >
                    Apply
                </button>
            </form>

            <small
                id="providers-loading"
                class="htmx-indicator"
                aria-live="polite"
            >Updating view...</small>

            <table class="providers-table width:100%">
                <thead>
                    <tr>
                        <th scope="col">Provider</th>
                        <th scope="col">Website</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="providers-body">
                    {{template "provider-list" .}}
                </tbody>
            </table>
        </article>

        {{template "provider-editor-panel" .}}
    </section>
</section>
{{end}}
