{{define "content"}}
<section class="crud-view fullbleed">
    <header class="crud-head">
        <div>
            <h2>{{.Title}}</h2>
            <p class="crud-subtitle">Track compute inventory, operating systems, hosting specs, and billing details.</p>
        </div>

        <a
            href="/servers/new"
            class="ok <big> <button> crud-create-action"
            hx-get="/servers/new"
            hx-target="#server-editor"
            hx-swap="outerHTML"
        >
            New server
        </a>
    </header>

    <section class="crud-grid flex-switch">
        <article class="box crud-list-box width:100%">
            <form
                id="servers-filters"
                class="tool-bar crud-toolbar margin-block-end"
                method="get"
                action="/servers"
                role="toolbar"
                aria-label="Filter servers"
            >
                <div class="crud-field">
                    <label for="server-limit">Show</label>
                    <select
                        id="server-limit"
                        name="limit"
                        hx-get="/servers"
                        hx-target="#servers-body"
                        hx-swap="innerHTML"
                        hx-include="#server-search,#server-limit"
                        hx-indicator="#servers-loading"
                        hx-trigger="change"
                        onchange="if (!window.htmx) this.form.submit();"
                    >
                        <option value="5" {{if eq .Limit 5}}selected{{end}}>5</option>
                        <option value="10" {{if eq .Limit 10}}selected{{end}}>10</option>
                        <option value="25" {{if eq .Limit 25}}selected{{end}}>25</option>
                        <option value="50" {{if eq .Limit 50}}selected{{end}}>50</option>
                        <option value="100" {{if eq .Limit 100}}selected{{end}}>100</option>
                    </select>
                </div>

                <div class="crud-field crud-search-field">
                    <label for="server-search">Search</label>
                    <input
                        id="server-search"
                        name="q"
                        type="search"
                        placeholder="Hostname, type, OS, provider, location"
                        value="{{.SearchTerm}}"
                        hx-get="/servers"
                        hx-target="#servers-body"
                        hx-swap="innerHTML"
                        hx-include="#server-search,#server-limit"
                        hx-indicator="#servers-loading"
                        hx-trigger="keyup changed delay:300ms, search"
                    >
                </div>

                <button type="submit" class="info <button> <big> crud-filter-apply">Apply</button>
            </form>

            <small id="servers-loading" class="htmx-indicator" aria-live="polite">Updating view...</small>

            <table class="crud-table servers-table width:100%">
                <thead>
                    <tr>
                        <th scope="col">Server</th>
                        <th scope="col">Specs</th>
                        <th scope="col">Provider / Location</th>
                        <th scope="col">Billing</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="servers-body">
                    {{template "server-list" .}}
                </tbody>
            </table>
        </article>

        {{template "server-editor-panel" .}}
    </section>
</section>
{{end}}
